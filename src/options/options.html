<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Tab Grouper - Settings</title>
</head>
<body>
  <div class="container">
    <header>
      <h1>Auto Tab Grouper Settings</h1>
      <p class="subtitle">Configure tab groups and their associated domains</p>
    </header>

    <div class="actions-bar">
      <button id="addGroup" class="btn btn-primary">+ Add Group</button>
      <div class="spacer"></div>
      <button id="importBtn" class="btn btn-secondary">Import</button>
      <button id="exportBtn" class="btn btn-secondary">Export</button>
      <input type="file" id="importFile" accept=".json" style="display: none;">
    </div>

    <div id="groupsContainer" class="groups-container"></div>

    <div id="emptyState" class="empty-state" style="display: none;">
      <p>No groups configured. Click "Add Group" to get started.</p>
    </div>

    <div class="footer">
      <button id="saveBtn" class="btn btn-primary btn-large">Save Changes</button>
      <div id="saveStatus" class="save-status"></div>
    </div>
  </div>

  <!-- Group Template (hidden) -->
  <template id="groupTemplate">
    <div class="group-card" data-group-index="">
      <div class="group-header">
        <input type="text" class="group-title-input" placeholder="Group name" maxlength="50">
        <select class="group-color-select">
          <option value="grey">Grey</option>
          <option value="blue">Blue</option>
          <option value="red">Red</option>
          <option value="yellow">Yellow</option>
          <option value="green">Green</option>
          <option value="pink">Pink</option>
          <option value="purple">Purple</option>
          <option value="cyan">Cyan</option>
        </select>
        <button class="btn-icon delete-group" title="Delete group">×</button>
      </div>
      <div class="domains-section">
        <div class="domains-header">
          <label>Domains (one per line)</label>
          <span class="domain-count">0 domains</span>
        </div>
        <textarea class="domains-input" placeholder="example.com&#10;www.example.com&#10;api.example.com" rows="5"></textarea>
        <div class="domain-hint">Enter domains without protocol (http:// or https://)</div>
      </div>
    </div>
  </template>
</body>
</html>
