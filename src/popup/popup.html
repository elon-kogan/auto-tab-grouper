<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Tab Grouper</title>
</head>
<body>
  <div class="container">
    <header>
      <h1>Auto Tab Grouper</h1>
      <label class="toggle">
        <input type="checkbox" id="enabledToggle">
        <span class="slider"></span>
      </label>
    </header>

    <div id="status" class="status"></div>

    <div class="groups-section">
      <h2>Groups</h2>
      <div id="groupsList" class="groups-list"></div>
    </div>

    <div class="actions">
      <button id="openOptions" class="btn btn-secondary">Settings</button>
    </div>
  </div>
</body>
</html>
